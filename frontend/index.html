<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>HC Dev - Frontend mínimo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid #1f2937;
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 8px;
    }
    p {
      margin: 4px 0 12px;
      color: #9ca3af;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
    }
    .btn-secondary {
      background: #1f2937;
      color: #e5e7eb;
    }
    .btn-danger {
      background: #f97373;
      color: #111827;
    }
    .status {
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    .status-ok {
      color: #4ade80;
    }
    .status-error {
      color: #fca5a5;
    }
    pre {
      background: #020617;
      border-radius: 8px;
      padding: 12px;
      max-height: 260px;
      overflow: auto;
      font-size: 0.85rem;
      border: 1px solid #1f2937;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #1f2937;
      color: #e5e7eb;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      HC Dev – Demo Cognito + API
      <span class="badge">Dev</span>
    </h1>
    <p>
      Demo mínima para el curso: login con Cognito Hosted UI y prueba de la API
      de <code>/pacientes</code> usando el token de acceso.
    </p>

    <div id="status" class="status">Revisando sesión...</div>

    <div class="buttons">
      <button id="loginBtn" class="btn-primary">Iniciar sesión</button>
      <button id="logoutBtn" class="btn-danger" disabled>Cerrar sesión</button>
      <button id="listarBtn" class="btn-secondary" disabled>Listar pacientes</button>
    </div>

    <div>
      <strong>Resultado:</strong>
      <pre id="output">(sin datos todavía)</pre>
    </div>
  </div>

  <!-- Importante: primero config.js, luego app.js -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
